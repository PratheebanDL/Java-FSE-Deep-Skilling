<section class="reactive-form-page">
  <h2>Student Enrollment Request (Reactive Form)</h2>

  <form [formGroup]="enrollForm" (ngSubmit)="onSubmit()">
    <div class="field">
      <label for="studentName">Student Name</label>
      <input id="studentName" type="text" formControlName="studentName" />
      <span
        class="error"
        *ngIf="enrollForm.get('studentName')?.touched && enrollForm.get('studentName')?.errors?.['required']"
      >
        Name is required
      </span>
      <span
        class="error"
        *ngIf="enrollForm.get('studentName')?.touched && enrollForm.get('studentName')?.errors?.['minlength']"
      >
        Name must be at least 3 characters
      </span>
    </div>

    <div class="field">
      <label for="studentEmail">Student Email</label>
      <input id="studentEmail" type="email" formControlName="studentEmail" />
      <span
        class="error"
        *ngIf="enrollForm.get('studentEmail')?.touched && enrollForm.get('studentEmail')?.errors?.['email']"
      >
        Enter a valid email address
      </span>
      <span
        class="error"
        *ngIf="enrollForm.get('studentEmail')?.errors?.['emailTaken']"
      >
        This email is already registered
      </span>
      <span
        class="hint"
        *ngIf="enrollForm.get('studentEmail')?.pending"
      >
        Checking email availability...
      </span>
    </div>

    <div class="field">
      <label for="courseId">Course ID</label>
      <input id="courseId" type="text" formControlName="courseId" />
      <span
        class="error"
        *ngIf="enrollForm.get('courseId')?.errors?.['required']"
      >
        Course ID is required
      </span>
      <span
        class="error"
        *ngIf="enrollForm.get('courseId')?.errors?.['noCourseCode']"
      >
        Course code starting with XX is not allowed.
      </span>
    </div>

    <div class="field">
      <label for="preferredSemester">Preferred Semester</label>
      <select id="preferredSemester" formControlName="preferredSemester">
        <option value="Odd">Odd</option>
        <option value="Even">Even</option>
      </select>
    </div>

    <div class="field checkbox-field">
      <label>
        <input type="checkbox" formControlName="agreeToTerms" />
        I agree to the enrollment terms
      </label>
    </div>

    <div class="field">
      <label>Additional Courses</label>
      <div
        class="dynamic-row"
        *ngFor="let ctrl of additionalCourses.controls; let i = index"
      >
        <input [formControl]="ctrl" placeholder="Course code" />
        <button type="button" (click)="removeCourse(i)">Remove</button>
      </div>
      <button type="button" class="add-btn" (click)="addCourse()">
        Add Another Course
      </button>
    </div>

    <div class="actions">
      <button type="submit" [disabled]="enrollForm.invalid">Submit</button>
    </div>
  </form>

  <div class="success" *ngIf="submitted">
    Enrollment request submitted successfully!
  </div>
</section>
