<section class="enrollment-form-page">
  <h2>Student Enrollment Request</h2>

  <form #enrollForm="ngForm" (ngSubmit)="onSubmit(enrollForm)" novalidate>
    <div class="field">
      <label for="studentName">Student Name</label>
      <input
        id="studentName"
        name="studentName"
        type="text"
        required
        minlength="3"
        [(ngModel)]="model.studentName"
        #nameCtrl="ngModel"
      />
      <span class="error" *ngIf="nameCtrl.touched && nameCtrl.errors?.['required']">
        Name is required
      </span>
      <span class="error" *ngIf="nameCtrl.touched && nameCtrl.errors?.['minlength']">
        Name must be at least 3 characters
      </span>
    </div>

    <div class="field">
      <label for="studentEmail">Student Email</label>
      <input
        id="studentEmail"
        name="studentEmail"
        type="email"
        required
        email
        [(ngModel)]="model.studentEmail"
        #emailCtrl="ngModel"
      />
      <span class="error" *ngIf="emailCtrl.touched && emailCtrl.errors?.['required']">
        Email is required
      </span>
      <span class="error" *ngIf="emailCtrl.touched && emailCtrl.errors?.['email']">
        Enter a valid email address
      </span>
    </div>

    <div class="field">
      <label for="courseId">Course ID</label>
      <input
        id="courseId"
        name="courseId"
        type="number"
        required
        [(ngModel)]="model.courseId"
        #courseIdCtrl="ngModel"
      />
      <span class="error" *ngIf="courseIdCtrl.touched && courseIdCtrl.errors?.['required']">
        Course ID is required
      </span>
    </div>

    <div class="field">
      <label for="preferredSemester">Preferred Semester</label>
      <select
        id="preferredSemester"
        name="preferredSemester"
        [(ngModel)]="model.preferredSemester"
      >
        <option value="Odd">Odd</option>
        <option value="Even">Even</option>
      </select>
    </div>

    <div class="field checkbox-field">
      <label>
        <input
          type="checkbox"
          name="agreeToTerms"
          required
          [(ngModel)]="model.agreeToTerms"
          #termsCtrl="ngModel"
        />
        I agree to the enrollment terms
      </label>
      <span class="error" *ngIf="termsCtrl.touched && termsCtrl.errors?.['required']">
        You must agree to the terms
      </span>
    </div>

    <div class="actions">
      <button type="submit" [disabled]="enrollForm.invalid">Submit</button>
      <button type="button" (click)="enrollForm.resetForm()">Reset</button>
    </div>
  </form>

  <div class="success" *ngIf="submitted">
    Enrollment request submitted successfully!
  </div>
</section>
