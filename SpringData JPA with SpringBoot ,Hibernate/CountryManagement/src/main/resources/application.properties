spring.application.name=CountryManagement

# --- H2 in-memory database ---
spring.datasource.url=jdbc:h2:mem:countrydb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# --- JPA / Hibernate ---
# Hibernate ddl auto (create, create-drop, update, validate)
# validate: checks that the table/columns already exist; throws an
# exception if a matching table or column is not found. Since Hibernate
# will NOT create the schema for us in this mode, schema.sql (below)
# creates the "country" table before Hibernate validates it.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- SQL initialization (schema.sql + data.sql) ---
# Ensures schema.sql/data.sql run even though H2 is "embedded" -
# explicit is safer than relying on Spring Boot's auto-detection.
spring.sql.init.mode=always
# IMPORTANT: do NOT defer datasource initialization here. Because
# ddl-auto=validate needs the "country" table to already exist when
# Hibernate builds the EntityManagerFactory, schema.sql/data.sql must
# run BEFORE that happens - which is Spring Boot's default behavior
# when spring.jpa.defer-datasource-initialization is left as false.

# --- H2 console (optional, for browsing data at runtime) ---
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

server.port=8080
