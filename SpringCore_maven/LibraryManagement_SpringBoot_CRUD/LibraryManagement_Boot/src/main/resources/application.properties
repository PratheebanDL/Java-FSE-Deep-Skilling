# Application name
spring.application.name=LibraryManagement

# --- H2 in-memory database connection ---
spring.datasource.url=jdbc:h2:mem:librarydb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# --- JPA / Hibernate ---
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# Automatically create/update tables based on entity classes
spring.jpa.hibernate.ddl-auto=update
# Log the SQL statements Hibernate generates (handy for learning/debugging)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- H2 web console (visit http://localhost:8080/h2-console once running) ---
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Server port (default is 8080; change if needed)
server.port=8080
